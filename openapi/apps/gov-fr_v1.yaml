# OpenAPI gov-fr v1 Specification
# This document is created by hand.
openapi: 3.1.0
info:
  contact:
    email: dev@invopop.com
    name: Invopop Developers
  description:
    Set of end-points for the France app, including lookups against
    the PPF Annuaire (French e-invoicing directory).
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: France Service API
  version: 0.1.0
servers:
  - description: production
    url: https://api.invopop.com
security:
  - InvopopAuth: []
paths:
  /apps/gov-fr/v1/directory/siren/{siren}:
    get:
      operationId: lookupDirectoryBySIREN
      summary: Look up directory entries by SIREN
      description: |-
        Returns all entries from the PPF Annuaire that
        match the given French SIREN. A company may have several entries 
        so the response is always a list.

        Only available to **live** workspaces. Sandbox workspaces receive
        `403 Forbidden`.
      parameters:
        - name: siren
          in: path
          required: true
          description: 9-digit French SIREN identifier of the company to look up.
          schema:
            type: string
            example: "123456789"
      responses:
        "200":
          description: Lookup completed. `count` may be `0` if the SIREN is not present in the directory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SIRENLookupResponse"
              examples:
                found:
                  summary: SIREN present in the directory
                  value:
                    siren: "123456789"
                    count: 1
                    results:
                      - id_instance: "1020993"
                        siren: "123456789"
                        siret: ""
                        routing_code: "ROUTE123"
                        platform_id: "0431"
                        nature: "M"
                        identifier: "269909452"
                        suffix: ""
                        start_date: "20251227"
                        end_date: ""
                        effective_end_date: "20280402"
                        created_at: "2026-01-15T10:00:00Z"
                        updated_at: "2026-01-15T10:00:00Z"
                not_found:
                  summary: SIREN not in the directory
                  value:
                    siren: "999999999"
                    count: 0
                    results: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /apps/gov-fr/v1/directory/identifier/{identifier}:
    get:
      operationId: lookupDirectoryByIdentifier
      summary: Look up directory entries by electronic address
      description: |-
        Returns all entries from the PPF Annuaire that
        match the given electronic address identifier (the value used to
        route invoices to a party in France represented by an inbox in Invopop).

        Only available to **live** workspaces. Sandbox workspaces receive
        `403 Forbidden`.
      parameters:
        - name: identifier
          in: path
          required: true
          description: |-
            Electronic address identifier as registered in the Annuaire,
            typically in `scheme:value` form (e.g. `0009:123456789`).
          schema:
            type: string
            example: "0009:123456789"
      responses:
        "200":
          description: Lookup completed. `count` may be `0` if no entry uses this identifier.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierLookupResponse"
              examples:
                found:
                  summary: Identifier present in the directory
                  value:
                    identifier: "0009:123456789"
                    count: 1
                    results:
                      - id_instance: "1020994"
                        siren: "269909452"
                        siret: ""
                        routing_code: "ROUTE123"
                        platform_id: "0431"
                        nature: "M"
                        identifier: "269909452_suffixe1"
                        suffix: "suffixe1"
                        start_date: "20251227"
                        end_date: ""
                        effective_end_date: "20280402"
                        created_at: "2026-01-15T10:00:00Z"
                        updated_at: "2026-01-15T10:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /apps/gov-fr/v1/entry/{silo_entry_id}/agreement:
    get:
      operationId: fetchEntryAgreement
      summary: Download the unsigned agreement PDF
      description: |-
        Returns the unsigned mandate PDF that the signer must review and
        sign. The PDF is generated on the fly from the silo entry's draft
        party; the call fails with `422` when any required party or signer
        field is missing from the silo envelope.
      parameters:
        - $ref: "#/components/parameters/SiloEntryID"
      responses:
        "200":
          description: PDF stream of the agreement, served inline.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      operationId: uploadEntryAgreement
      summary: Upload the signed agreement
      description: |-
        Stores the customer's signed PDF on the silo entry together with
        the chosen signature method. This call only persists the document
        — it does not record an approval decision. Call `POST /confirm`
        afterwards to mark the submission as complete.

        Two signature methods are accepted:

        - `esignature` — the PDF was signed electronically (PAdES). The
          signature is validated cryptographically against the EU Trusted
          List.
        - `identity` — the PDF was signed by hand. The customer must also
          upload identity images via `POST /identity` before confirming;
          verification is delegated to Invopop's approval service.
      parameters:
        - $ref: "#/components/parameters/SiloEntryID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgreementSubmit"
      responses:
        "204":
          description: Signed agreement stored.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /apps/gov-fr/v1/entry/{silo_entry_id}/identity:
    post:
      operationId: uploadEntryIdentity
      summary: Upload an identity document image
      description: |-
        Stores one face of the signer's identity document as an attachment
        on the silo entry. Required before confirming when
        `signature=identity` was used on the agreement upload.

        Call once per `view`:

        - `front` + `back` for an ID card (CNI, titre de séjour).
        - `page` for a passport.

        Re-uploading the same `view` overwrites the previous image. The
        MIME type is detected from the bytes — clients do not send it.
      parameters:
        - $ref: "#/components/parameters/SiloEntryID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityUpload"
      responses:
        "204":
          description: Identity image stored.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /apps/gov-fr/v1/entry/{silo_entry_id}/confirm:
    post:
      operationId: confirmEntry
      summary: Confirm the onboarding submission
      description: |-
        Marks the customer's submission as complete. Records the decision
        in silo meta and pokes the queued `agreement.wait.approval` task
        so the onboarding workflow can continue.

        Must be called after `POST /agreement` (and `POST /identity` when
        the signature method was `identity`).
      parameters:
        - $ref: "#/components/parameters/SiloEntryID"
      responses:
        "204":
          description: Submission confirmed.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    SiloEntryID:
      name: silo_entry_id
      in: path
      required: true
      description: ID of the `org.Party` silo entry being onboarded.
      schema:
        type: string
        example: "5b45453c-cdd0-11ed-afa1-0242ac120002"

  schemas:
    DirectoryEntry:
      type: object
      description: |-
        Single entry in the PPF Annuaire. Each entry
        represents one registered electronic address for a SIREN/SIRET.
      properties:
        id_instance:
          type: string
          description: Unique instance identifier from the PPF export.
          example: "1020993"
        siren:
          type: string
          description: 9-digit French SIREN of the company.
          example: "269909452"
        siret:
          type: string
          description: 14-digit French SIRET of the establishment, when applicable.
          example: ""
        routing_code:
          type: string
          description: Routing code used by the PPF to deliver invoices.
          example: "ROUTE123"
        platform_id:
          type: string
          description: 4-digit identifier of the PA platform that registered the entry.
          example: "0431"
        nature:
          type: string
          description: Single-letter code for the nature of the entry as classified by the Annuaire.
          example: "M"
        identifier:
          type: string
          description: |-
            Electronic address identifier used for routing. Typically the SIREN,
            optionally with a `_suffix` qualifier when multiple addresses exist
            for the same company.
          example: "269909452"
        suffix:
          type: string
          description: Optional suffix qualifying the identifier.
          example: "suffixe1"
        start_date:
          type: string
          description: Date from which this entry is active in the Annuaire, as `YYYYMMDD`.
          example: "20251227"
        end_date:
          type: string
          description: Scheduled end date of the entry as `YYYYMMDD`, when set.
          example: ""
        effective_end_date:
          type: string
          description: Effective end date as `YYYYMMDD`, once the entry has been deactivated.
          example: "20280402"
        created_at:
          type: string
          format: date-time
          description: When this entry was first stored in the local mirror.
          example: "2026-01-15T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: When this entry was last refreshed from a PPF export.
          example: "2026-01-15T10:00:00Z"

    SIRENLookupResponse:
      type: object
      required: [siren, count, results]
      properties:
        siren:
          type: string
          description: SIREN that was queried.
          example: "123456789"
        count:
          type: integer
          description: Number of directory entries returned.
          example: 1
        results:
          type: array
          description: Matching directory entries. Empty when the SIREN is not in the Annuaire.
          items:
            $ref: "#/components/schemas/DirectoryEntry"

    IdentifierLookupResponse:
      type: object
      required: [identifier, count, results]
      properties:
        identifier:
          type: string
          description: Electronic address identifier that was queried.
          example: "0009:123456789"
        count:
          type: integer
          description: Number of directory entries returned.
          example: 1
        results:
          type: array
          description: Matching directory entries. Empty when the identifier is not in the Annuaire.
          items:
            $ref: "#/components/schemas/DirectoryEntry"

    AgreementSubmit:
      type: object
      required: [signature, data]
      properties:
        signature:
          type: string
          description: |-
            How the customer signed the agreement.

              - `esignature` - Signed electronically (PAdES). The PDF
                signature is validated against the EU Trusted List.
              - `identity` - Signed by hand and accompanied by uploaded
                identity images. Verification is delegated to Invopop's
                approval service.
          enum: ["esignature", "identity"]
        data:
          type: string
          format: byte
          description: Base64-encoded binary of the signed PDF agreement. Must be `application/pdf`.

    IdentityUpload:
      type: object
      required: [view, data]
      properties:
        view:
          type: string
          description: |-
            Which face of the identity document this image represents.

              - `front` - Front of an ID card (recto).
              - `back` - Back of an ID card (verso).
              - `page` - Photo page of a passport.
          enum: ["front", "back", "page"]
        data:
          type: string
          format: byte
          description: |-
            Base64-encoded binary of the image. Must be `image/jpeg` or
            `image/png`, maximum 10 MB. Text on the document should be
            clearly legible. The MIME type is detected from the bytes.

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable description of the error.
          example: "missing siren parameter"

  responses:
    BadRequest:
      description: The request is malformed or missing required parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "missing siren parameter"

    Unauthorized:
      description: Missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "missing enrollment"

    Forbidden:
      description: |-
        The directory API is only available to live workspaces. Calls made
        with a sandbox enrollment are rejected.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "directory API is only available for live workspaces"

    NotFound:
      description: The referenced silo entry or party could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "silo entry not found"

    UnprocessableEntity:
      description: |-
        The request is well-formed but cannot be processed — for example
        the agreement PDF cannot be generated because the draft party is
        incomplete, or the uploaded signature failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "draft party is missing signer details"

    InternalServerError:
      description: An unexpected server-side error occurred.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "internal server error"

  securitySchemes:
    InvopopAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |-
        Authenticate using a valid Invopop enrollment token in the `Bearer`
        scheme.

        Example: `Authorization: Bearer <token>`
